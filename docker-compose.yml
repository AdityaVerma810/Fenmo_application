version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - expense_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""        # empty → frontend calls /expenses via nginx proxy
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  expense_data:
